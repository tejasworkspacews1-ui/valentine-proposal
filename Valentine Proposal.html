<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal | Love</title>

<style>
body {
    background: linear-gradient(135deg, #ffb3c6, #ffd6e0);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
}

.container {
    background: #fff;
    padding: 40px;
    border-radius: 28px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    text-align: center;
    width: 420px;
}

#main-gif {
    width: 100%;
    max-height: 230px;
    object-fit: contain;
    border-radius: 16px;
    margin-bottom: 20px;
}

h1 {
    color: #d63384;
    font-size: 24px;
    min-height: 60px;
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
}

button {
    padding: 14px 32px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: transform 0.25s ease, background 0.25s ease;
}

#yesBtn {
    background: #ff4d6d;
    color: white;
}

#yesBtn:hover {
    transform: scale(1.1);
}

#noBtn {
    background: #f1f1f1;
    color: #333;
    position: relative;
}
</style>
</head>

<body>

<div class="container">
    <img id="main-gif" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">
    <h1 id="question">Do you love me? 🤍</h1>

    <div class="buttons">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const question = document.getElementById("question");
const gif = document.getElementById("main-gif");

const stages = [
    { text: "Are you sure? 🥺", gif: "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUycTEwNW53dzA5amxrZ3UzaG10dzE3dDZqcmdpajZ0MTkxYTdiazBzbyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/ZQOK8SFetn75GK9HEi/giphy.gif" },
    { text: "Really sure? 😭", gif: "https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUyeWxiN3Nob2RocWk0bzdoM3JkMWtjdmZwZzFqYWV2OXNtNDZvajdpciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/fhLgA6nJec3Cw/giphy.gif" },
    { text: "Please think again 💔", gif: "https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUycHIwcHBsd2Zna2MxdWo5dmRieHhkc29pdm9odmtuNjBiNTZmaXlyciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/98MaHVwJOmWMz4cz1K/giphy.gif" },
    { text: "This is getting difficult… 😢", gif: "https://media3.giphy.com/media/v1.Y2lkPTZjMDliOTUyenNvZms1eW1kNzJtNGRvcGNib3Z4aDVvaWU4cXhoOXB1czEwNThieiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/ykaNntbZ3hfsWotKmA/giphy.gif" },
    { text: "Okay… last chance 😿", gif: "https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUyM2psMDdmNWc1c2o3NXkyaTE0NGh4am15ZHA0NWZxdjZtcXlpYTcwcCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/GAXXHdS0zXawVLOJLY/giphy.gif" }
];

let stage = 0;
let runawayEnabled = false;

noBtn.addEventListener("click", () => {
    if (stage < stages.length) {
        question.innerText = stages[stage].text;
        gif.src = stages[stage].gif;
        stage++;
    }
    if (stage === stages.length) {
        runawayEnabled = true;
    }
});

document.addEventListener("mousemove", (e) => {
    if (!runawayEnabled) return;

    const rect = noBtn.getBoundingClientRect();
    const distance = Math.hypot(
        e.clientX - (rect.left + rect.width / 2),
        e.clientY - (rect.top + rect.height / 2)
    );

    if (distance < 120) {
        teleportButton();
    }
});

function teleportButton() {
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);

    noBtn.style.position = "fixed";
    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;
}

yesBtn.addEventListener("click", () => {
    question.innerText = "I knew it 💕";
    gif.src = "https://media0.giphy.com/media/v1.Y2lkPTZjMDliOTUybmM2cjVpcjJzdGpobDRrdWFqeHM1MHE4dWE3aDV0eThxYTczdDR3NiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/C8ih1zB9e9KJLySClx/giphy.gif";
    noBtn.style.display = "none";
});
</script>

</body>
</html>
